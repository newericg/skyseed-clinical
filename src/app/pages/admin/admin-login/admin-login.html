<div class="login-page">
  <div class="login-bg" aria-hidden="true">
    <div class="login-bg-gradient"></div>
    <div class="login-bg-grid"></div>
    <div class="login-bg-orb login-bg-orb--1"></div>
    <div class="login-bg-orb login-bg-orb--2"></div>
    <div class="login-bg-orb login-bg-orb--3"></div>
  </div>

  <div class="login-shell">
    <div class="login-card">
      <div class="login-card-accent" aria-hidden="true"></div>

      <header class="login-brand">
        <a routerLink="/" class="login-logo-link" aria-label="Skyseed Clinical — Página inicial">
          <picture>
            <source srcset="/assets/logo/logo-header.webp" type="image/webp" />
            <img
              src="/assets/logo/logo-header.png"
              alt=""
              width="154"
              height="96"
              class="login-logo"
            />
          </picture>
        </a>
        <p class="login-badge">Painel editorial</p>
      </header>

      <div class="login-header">
        <h1>Entrar</h1>
        <p class="login-lead">Acesso restrito à equipe editorial.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <label class="field">
          <span class="field-label">E-mail</span>
          <input
            type="email"
            formControlName="email"
            autocomplete="username"
            placeholder="seu@email.com"
          />
        </label>

        <label class="field">
          <span class="field-label">Senha</span>
          <input
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
        </label>

        @if (error()) {
          <p class="form-error" role="alert">{{ error() }}</p>
        }

        <button type="submit" class="login-submit" [disabled]="loading()">
          @if (loading()) {
            <span class="login-spinner" aria-hidden="true"></span>
            Entrando…
          } @else {
            Entrar
          }
        </button>
      </form>

      <footer class="login-footer">
        <a routerLink="/" class="login-back">← Voltar ao site</a>
      </footer>
    </div>

    <p class="login-copy">© Skyseed Clinical</p>
  </div>
</div>
