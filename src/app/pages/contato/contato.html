<div class="contato-page">
  <div class="contato-inner">
    <header class="contato-hero">
      <p class="section-label">{{ t.label }}</p>
      <h1 class="contato-title">{{ t.title }}</h1>
      <p class="contato-lead">{{ t.lead }}</p>
    </header>

    <div class="contato-layout">
      <app-contact-form layout="page" idPrefix="contato" />

      <aside class="contato-info">
        <h2 class="info-title">{{ t.contactInfo }}</h2>

        <div class="info-block">
          <p class="info-label">{{ t.whatsapp }}</p>
          <p class="info-value muted">{{ t.whatsappSoon }}</p>
        </div>

        <div class="info-block">
          <p class="info-label">{{ t.emailLabel }}</p>
          <a class="info-value link" [href]="'mailto:' + t.emailValue">{{ t.emailValue }}</a>
        </div>

        <div class="info-block">
          <p class="info-label">{{ t.social }}</p>
          <div class="social-links" [attr.aria-label]="t.social">
            <span class="social-link" role="link" aria-disabled="true" tabindex="-1" aria-label="X (Twitter)">𝕏</span>
            <span class="social-link" role="link" aria-disabled="true" tabindex="-1" aria-label="LinkedIn">in</span>
            <span class="social-link" role="link" aria-disabled="true" tabindex="-1" aria-label="YouTube">▶</span>
            <span class="social-link" role="link" aria-disabled="true" tabindex="-1" aria-label="Instagram">◉</span>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>
