<div class="contato-page">
  <div class="contato-inner">
    <header class="contato-hero">
      <p class="section-label">{{ t.label }}</p>
      <h1 class="contato-title">{{ t.title }}</h1>
      <p class="contato-lead">{{ t.lead }}</p>
    </header>

    <div class="contato-layout">
      <app-contact-form layout="page" idPrefix="contato" />

      <aside class="contato-info">
        <h2 class="info-title">{{ t.contactInfo }}</h2>

        <div class="info-block">
          <p class="info-label">{{ t.whatsapp }}</p>
          @if (whatsappUrl) {
            <a
              class="info-value link"
              [href]="whatsappUrl"
              target="_blank"
              rel="noopener noreferrer"
            >{{ t.whatsappValue }}</a>
          } @else {
            <p class="info-value">{{ t.whatsappValue }}</p>
          }
        </div>

        <div class="info-block">
          <p class="info-label">{{ t.emailLabel }}</p>
          <a class="info-value link" [href]="'mailto:' + t.emailValue">{{ t.emailValue }}</a>
        </div>

        <div class="info-block">
          <p class="info-label">{{ t.social }}</p>
          <a
            class="info-value link"
            [href]="t.instagramUrl"
            target="_blank"
            rel="noopener noreferrer"
          >{{ t.instagramHandle }}</a>
        </div>
      </aside>
    </div>
  </div>
</div>
