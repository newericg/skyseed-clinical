<footer>
  <div class="footer-top">
    <div class="footer-brand">
      <a routerLink="/" class="footer-logo-link" [attr.aria-label]="lang === 'pt' ? 'Skyseed Clinical — Página inicial' : 'Skyseed Clinical — Home'">
        <picture>
          <source srcset="/assets/logo/logo-footer.webp" type="image/webp">
          <img src="/assets/logo/logo-footer.png" alt="" width="96" height="60" class="nav-logo">
        </picture>
      </a>
      <p>{{ t.blurb }}</p>
      <div class="footer-social" [attr.aria-label]="lang === 'pt' ? 'Redes sociais' : 'Social media'">
        <span class="social-link social-link--disabled" aria-disabled="true" tabindex="-1" aria-label="X (Twitter)">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </span>
        <span class="social-link social-link--disabled" aria-disabled="true" tabindex="-1" aria-label="YouTube">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </span>
        <a
          class="social-link"
          [href]="instagramUrl"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
      </div>
    </div>

    <nav class="footer-col" [attr.aria-label]="t.navTitle">
      <p class="footer-col-title">{{ t.navTitle }}</p>
      <a routerLink="/" fragment="about">{{ t.about }}</a>
      <a routerLink="/lancamentos">{{ t.lancamentos }}</a>
      <a routerLink="/blog">{{ t.blog }}</a>
      <!-- <a routerLink="/onde-comprar">{{ t.whereToBuy }}</a> -->
      <a routerLink="/contato">{{ t.contact }}</a>
    </nav>

    <div class="footer-col footer-col--legal">
      <p class="footer-col-title">{{ t.legalTitle }}</p>
      <a routerLink="/politica-de-privacidade">{{ t.privacy }}</a>
      <a routerLink="/termos-de-uso">{{ t.terms }}</a>
    </div>

    <aside class="footer-reseller">
      <p class="footer-reseller-title">{{ t.resellerTitle }}</p>
      <p class="footer-reseller-desc">{{ t.resellerDesc }}</p>
      <a routerLink="/contato" class="footer-reseller-btn">{{ t.resellerBtn }}</a>
    </aside>
  </div>

  <div class="footer-bottom">
    <p class="footer-copy">{{ t.copy }}</p>
  </div>
</footer>
