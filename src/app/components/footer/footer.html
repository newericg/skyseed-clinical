<footer>
  <div class="footer-top">
    <div class="footer-brand">
      <a routerLink="/" class="footer-logo-link" [attr.aria-label]="lang === 'pt' ? 'Skyseed Clinical — Página inicial' : 'Skyseed Clinical — Home'">
        <picture>
          <source srcset="/assets/logo/logo-footer.webp" type="image/webp">
          <img src="/assets/logo/logo-footer.png" alt="" width="96" height="60" class="nav-logo">
        </picture>
      </a>
      <p>{{ t.blurb }}</p>
      <div class="footer-social" [attr.aria-label]="lang === 'pt' ? 'Redes sociais' : 'Social media'">
        <a
          class="social-link"
          [href]="instagramUrl"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="'Instagram ' + instagramHandle"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
      </div>
    </div>

    <nav class="footer-col" [attr.aria-label]="t.navTitle">
      <p class="footer-col-title">{{ t.navTitle }}</p>
      <a routerLink="/" fragment="about">{{ t.about }}</a>
      <a routerLink="/lancamentos">{{ t.lancamentos }}</a>
      <a routerLink="/blog">{{ t.blog }}</a>
      <!-- <a routerLink="/onde-comprar">{{ t.whereToBuy }}</a> -->
      <a routerLink="/contato">{{ t.contact }}</a>
    </nav>

    <div class="footer-col footer-col--legal">
      <p class="footer-col-title">{{ t.legalTitle }}</p>
      <a routerLink="/politica-de-privacidade">{{ t.privacy }}</a>
      <a routerLink="/termos-de-uso">{{ t.terms }}</a>
    </div>

    <aside class="footer-reseller">
      <p class="footer-reseller-title">{{ t.resellerTitle }}</p>
      <p class="footer-reseller-desc">{{ t.resellerDesc }}</p>
      <a routerLink="/contato" class="footer-reseller-btn">{{ t.resellerBtn }}</a>
    </aside>
  </div>

  <div class="footer-bottom">
    <p class="footer-copy">{{ t.copy }}</p>
  </div>
</footer>
